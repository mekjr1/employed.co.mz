name: Deploy UAT
on:
  push:
    branches: [uat]
    paths-ignore: ["**.md", "docs/**"]
# Meteor app: build & deploy via SSH; Meteor serves frontend + API together.
jobs:
  build:
    uses: mekjr1/.github/.github/workflows/build-push-ghcr.yml@main
    permissions: { contents: read, packages: write }
    with: { image-name: employed-app, context: ".", dockerfile: Dockerfile }
  deploy:
    needs: build
    uses: mekjr1/.github/.github/workflows/deploy-compose.yml@main
    with:
      compose-dir: /opt/employed
      services: app
      health-check-url: https://employed.xibodev.com/health
    secrets:
      SSH_HOST: ${{ secrets.BOX3_HOST }}
      SSH_KEY: ${{ secrets.BOX3_SSH_KEY }}
