# Deploy to Box 3 (109.123.241.71 — Consumer + SaaS).
# Triggers on push to the `uat` branch.
#
# Required GitHub secrets:
#   BOX3_HOST, BOX3_SSH_KEY (already set)
#   EMPLOYED_UAT_DB_PASSWORD, EMPLOYED_UAT_SECRET_KEY, EMPLOYED_UAT_IP_SALT
#   EMPLOYED_UAT_STRIPE_SK, EMPLOYED_UAT_STRIPE_WH_SECRET, EMPLOYED_UAT_STRIPE_PK
#   EMPLOYED_UAT_RECAPTCHA_SITE_KEY, EMPLOYED_UAT_RECAPTCHA_SECRET_KEY
#   EMPLOYED_UAT_GOOGLE_CLIENT_ID, EMPLOYED_UAT_GOOGLE_CLIENT_SECRET
#
# Box 3 layout:
#   /opt/employed/docker-compose.yml  — production compose (GHCR images)
#   /opt/employed/.env                — secrets (chmod 600, not committed)

name: Deploy UAT

on:
  push:
    branches: [uat]
    paths-ignore: ["**.md", "docs/**"]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/mekjr1/employed-api:uat

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/mekjr1/employed-frontend:uat
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.employed.xibodev.com
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.EMPLOYED_UAT_RECAPTCHA_SITE_KEY }}

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure /opt/employed exists on Box 3
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BOX3_HOST }}
          username: ubuntu
          key: ${{ secrets.BOX3_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/employed
            sudo chown ubuntu:ubuntu /opt/employed
            touch /opt/employed/.env
            chmod 600 /opt/employed/.env

      - name: Copy production compose to Box 3
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BOX3_HOST }}
          username: ubuntu
          key: ${{ secrets.BOX3_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml"
          target: "/opt/employed/"
          strip_components: 1

      - name: Upsert env, activate compose, and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.EMPLOYED_UAT_DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.EMPLOYED_UAT_SECRET_KEY }}
          IP_SALT: ${{ secrets.EMPLOYED_UAT_IP_SALT }}
          STRIPE_SK: ${{ secrets.EMPLOYED_UAT_STRIPE_SK }}
          STRIPE_WH: ${{ secrets.EMPLOYED_UAT_STRIPE_WH_SECRET }}
          STRIPE_PK: ${{ secrets.EMPLOYED_UAT_STRIPE_PK }}
          RECAPTCHA_SK: ${{ secrets.EMPLOYED_UAT_RECAPTCHA_SECRET_KEY }}
          RECAPTCHA_SITE: ${{ secrets.EMPLOYED_UAT_RECAPTCHA_SITE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.EMPLOYED_UAT_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.EMPLOYED_UAT_GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.BOX3_HOST }}
          username: ubuntu
          key: ${{ secrets.BOX3_SSH_KEY }}
          envs: POSTGRES_PASSWORD,SECRET_KEY,IP_SALT,STRIPE_SK,STRIPE_WH,STRIPE_PK,RECAPTCHA_SK,RECAPTCHA_SITE,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            set -e

            # Activate production compose (SCP lands as docker-compose.prod.yml)
            mv -f /opt/employed/docker-compose.prod.yml /opt/employed/docker-compose.yml

            # Upsert secrets into /opt/employed/.env
            cd /opt/employed
            touch .env && chmod 600 .env
            upsert() {
              key="$1"; val="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s#^${key}=.*#${key}=${val}#" .env
              else
                printf '%s=%s\n' "$key" "$val" >> .env
              fi
            }

            upsert POSTGRES_USER        employed
            upsert POSTGRES_PASSWORD    "$POSTGRES_PASSWORD"
            upsert POSTGRES_DB          employed
            upsert DATABASE_URL         "postgresql://employed:${POSTGRES_PASSWORD}@postgres:5432/employed"
            upsert REDIS_URL            "redis://redis:6379/0"
            upsert SECRET_KEY           "$SECRET_KEY"
            upsert JWT_ALGORITHM        HS256
            upsert ACCESS_TOKEN_EXPIRE_MINUTES  30
            upsert REFRESH_TOKEN_EXPIRE_DAYS    7
            upsert STRIPE_SECRET_KEY    "$STRIPE_SK"
            upsert STRIPE_WEBHOOK_SECRET "$STRIPE_WH"
            upsert STRIPE_PUBLISHABLE_KEY "$STRIPE_PK"
            upsert IP_SALT              "$IP_SALT"
            upsert RECAPTCHA_SECRET_KEY "$RECAPTCHA_SK"
            upsert NEXT_PUBLIC_RECAPTCHA_SITE_KEY "$RECAPTCHA_SITE"
            upsert GOOGLE_CLIENT_ID     "$GOOGLE_CLIENT_ID"
            upsert GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET"
            upsert DEBUG                false
            upsert NEXT_PUBLIC_API_URL  https://api.employed.xibodev.com
            upsert FROM_EMAIL           "Employed <noreply@xibodev.com>"
            upsert ADMIN_EMAIL          admin@employed.co.mz

            # Pull updated images and restart services
            docker compose pull
            docker compose up -d --remove-orphans

            # Wait for backend to become healthy (up to 60s)
            for i in $(seq 1 10); do
              if curl -fsSo /dev/null http://localhost:3301/health; then
                echo "Backend healthy."
                break
              fi
              [ "$i" -eq 10 ] && { echo "Backend never became healthy."; exit 1; }
              echo "Waiting for backend ($i/10)..."
              sleep 6
            done
            echo "Deploy and smoke test passed."
