name: ci

on:
  push:
    branches: [main, master, uat]
  pull_request:

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          requirements = []
          for path in sorted(Path('backend').glob('requirements*.txt')):
              for line in path.read_text(encoding='utf-8').splitlines():
                  stripped = line.strip()
                  if stripped and not stripped.startswith('#') and stripped not in requirements:
                      requirements.append(stripped)
          Path('backend/requirements-ci.txt').write_text('\n'.join(requirements) + '\n', encoding='utf-8')
          PY
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt ruff

      - name: Ruff check
        run: ruff check backend

      - name: Ruff format check
        run: ruff format --check backend

  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: employed
          POSTGRES_PASSWORD: employed_dev
          POSTGRES_DB: employed_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U employed -d employed_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          requirements = []
          for path in sorted(Path('backend').glob('requirements*.txt')):
              for line in path.read_text(encoding='utf-8').splitlines():
                  stripped = line.strip()
                  if stripped and not stripped.startswith('#') and stripped not in requirements:
                      requirements.append(stripped)
          Path('backend/requirements-ci.txt').write_text('\n'.join(requirements) + '\n', encoding='utf-8')
          PY
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt pytest

      - name: Run pytest
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          DATABASE_URL: postgresql+psycopg2://employed:employed_dev@127.0.0.1:5432/employed_test
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://employed:employed_dev@127.0.0.1:5432/employed_test
          REDIS_URL: redis://127.0.0.1:6379/0
          SECRET_KEY: test-secret-key
          DEBUG: "false"
        run: |
          set +e
          pytest backend -q
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 5 ]; then
            exit "$status"
          fi
          if [ "$status" -eq 5 ]; then
            echo "No backend pytest tests collected yet."
          fi

  frontend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install lint dependencies
        run: npm install --no-save eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin

      - name: ESLint
        run: npx eslint . --max-warnings=0

      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [20]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3301
        run: npm run build
