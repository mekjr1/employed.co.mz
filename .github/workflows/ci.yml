name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mongo:
        image: mongo:5
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Meteor
        run: |
          curl https://install.meteor.com/ | sh
          echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Use repo-pinned Meteor release
        run: meteor --version

      - name: Cache Meteor packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.meteor
            .meteor/local
          key: ${{ runner.os }}-meteor-${{ hashFiles('.meteor/versions') }}
          restore-keys: |
            ${{ runner.os }}-meteor-

      - name: Install npm dependencies
        run: meteor npm ci

      - name: Lint
        run: meteor npm run lint --silent

      - name: Run tests
        env:
          MONGO_URL: mongodb://localhost:27017/employed_test
          ROOT_URL: http://localhost:3000
        run: |
          # S11: drives the suite in tests/. Requires meteortesting:mocha
          # to be enabled in .meteor/packages.
          meteor test --once \
            --driver-package meteortesting:mocha \
            --port 3000 \
            --settings settings-example.json

  e2e-smoke:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build & start app (Docker)
        run: |
          docker compose -f docker-compose.yml up -d --build --wait
        timeout-minutes: 10

      - name: Healthz smoke test
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/healthz; then
              echo " ✓ /healthz OK"
              exit 0
            fi
            echo "  waiting ($i/30)..."
            sleep 2
          done
          echo "✗ /healthz never responded"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test tests/e2e/ --reporter=list

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml down -v
