<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline — Employed</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         margin: 0; padding: 2rem; background: #FAFAF7; color: #1F2937;
         display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; text-align: center; }
  .card { max-width: 420px; background: #fff; border-radius: 12px; padding: 24px 20px;
          box-shadow: 0 4px 16px rgba(0,0,0,0.04); border: 1px solid #E5E7EB; }
  h1 { margin: 0 0 10px; font-size: 22px; }
  p { margin: 0 0 16px; color: #4B5563; font-size: 15px; line-height: 1.45; }
  button { background: #4F46E5; color: #fff; border: none; border-radius: 8px;
           padding: 10px 18px; font-weight: 600; font-size: 14px; cursor: pointer; }
  button:hover { background: #4338CA; }
</style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>The page you were trying to reach needs a network connection. Once you're back online, this page will refresh automatically.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
  <script>
    // Auto-retry when the network comes back so the user doesn't have
    // to remember to tap the button.
    if ('onLine' in navigator) {
      window.addEventListener('online', function() { location.reload(); });
    }
  </script>
</body>
</html>
