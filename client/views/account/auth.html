<!--
  A9.32 — Hand-rolled auth templates (PR 2 of BS5 migration).

  Replaces the markup that `useraccounts:bootstrap` used to render at the
  same paths. The package is still mounted (rollback safety) but its
  `AccountsTemplates.configureRoute(...)` calls in `both/accounts.js` are
  commented out, so iron-router owns these routes now (see router.js).

  Markup still uses Bootstrap 3 classes (`.form-group`, `.btn`,
  `.alert`) because the BS3 stylesheet is currently mounted via
  `nemo64:bootstrap`. PR 3 of the migration sweeps BS3 → BS5 across
  every template in one pass, so writing BS5 markup here today would
  produce visually broken pages.

  The wrapping `.auth-card` class is already defined in `client/lib/app.less`
  (added during the May 2026 rebrand pass). It gives every auth surface a
  consistent 420px white card with the brand-indigo wordmark on top.

  Logic lives in `auth.js` next door.
-->

<!-- ────────────────────────── Sign in ────────────────────────── -->
<template name="signIn">
  <div class="auth-page-wrap">
    <div class="auth-card">
      <span class="auth-logo">{{appName}}</span>
      <h3>{{t 'accounts.signIn.title'}}</h3>
      <p class="text-muted text-center" style="margin-top:-12px;margin-bottom:20px;">
        {{t 'accounts.signIn.subtitle'}}
      </p>

      {{#if errorMessage}}
        <div class="alert alert-danger" role="alert" aria-live="polite">
          {{errorMessage}}
        </div>
      {{/if}}

      <form id="signInForm" novalidate>
        <div class="form-group">
          <label for="signInEmail">{{t 'accounts.field.email.placeholder'}}</label>
          <input type="email" id="signInEmail" name="email" class="form-control"
                 autocomplete="username" required placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="signInPassword">{{t 'accounts.field.password.placeholder'}}</label>
          <input type="password" id="signInPassword" name="password" class="form-control"
                 autocomplete="current-password" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary btn-block" data-action="submit">
          {{#if isLoading}}
            <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
          {{/if}}
          {{t 'accounts.signIn.button'}}
        </button>
      </form>

      <p class="text-center" style="margin-top:18px;">
        <a href="{{pathFor 'forgotPwd'}}">{{t 'accounts.link.forgotPwd'}}</a>
      </p>
      <hr>
      <p class="text-center" style="margin-bottom:0;">
        <a href="{{pathFor 'signUp'}}">{{t 'accounts.link.signUp'}}</a>
      </p>
    </div>
  </div>
</template>

<template name="verifyEmail">
  <div class="auth-page-wrap">
    <div class="auth-card">
      <span class="auth-logo">{{appName}}</span>
      <h3>{{t 'accounts.verifyEmail.title'}}</h3>

      {{#if isVerifying}}

          <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
          {{t 'accounts.verifyEmail.verifying'}}
        </p>
      {{else}}
        {{#if errorMessage}}
          <div class="alert alert-danger" role="alert" aria-live="polite">
            {{errorMessage}}
          </div>
        {{else}}
          <div class="alert alert-success" role="alert" aria-live="polite">
            {{successMessage}}
          </div>
        {{/if}}

        <p class="text-center" style="margin-top:18px;margin-bottom:0;">
          <a href="{{pathFor 'home'}}" class="btn btn-primary btn-block">
            {{t 'nav.all_jobs'}}
          </a>
        </p>
      {{/if}}
    </div>
  </div>
</template>
