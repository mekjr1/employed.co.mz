<template name="adminJobs">
    <div class="row">
        <div class="col-sm-12">
            <h1>{{t 'admin.title'}}</h1>
            <p class="text-muted">{{t 'admin.subtitle'}}</p>
        </div>
    </div>

    {{#if isInRole 'admin'}}
        {{!-- B3.4: status tabs. The active tab drives the `adminJobs`
              subscription (see adminJobs.js). --}}
        <ul class="nav nav-tabs admin-status-tabs">
            {{#each statusTabs}}
                <li class="{{tabActiveClass}}">
                    <a href="#" class="set-tab" data-tab="{{tabKey}}">
                        {{label}}
                        {{#if isPendingTab}}
                            {{#if pendingCount}}
                                <span class="badge">{{pendingCount}}</span>
                            {{/if}}
                        {{/if}}
                    </a>
                </li>
            {{/each}}
        </ul>

        {{!-- B3.8: bulk action bar. --}}
        <div class="admin-bulk-bar" style="margin: 12px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
            <label style="font-weight: normal;">
                <input type="checkbox" class="select-all"> {{t 'admin.select_all_on_page'}}
            </label>
            <span class="text-muted">{{t 'admin.selected_count' n=selectedCount}}</span>
            <select class="form-control bulk-status" style="width: auto;" aria-label="{{t 'admin.bulk_set_status'}}">
                <option value="">{{t 'admin.bulk_set_status'}}</option>
                {{#each statuses}}
                    <option value="{{this}}">{{this}}</option>
                {{/each}}
            </select>
            <button type="button" class="btn btn-default bulk-apply" {{bulkApplyDisabled}}>
                {{t 'admin.apply_to_selected'}}
            </button>
        </div>

        {{#if Template.subscriptionsReady}}
            {{#each jobs}}
                <div class="panel panel-default admin-job-panel">
                    <div class="panel-body">
                        <div class="row">
                            <div class="col-sm-8">
                                <label style="font-weight: normal;">
                                    <input type="checkbox" class="select-job" data-job-id="{{_id}}" checked={{isSelected}}>
                                    <h2 class="h4" style="display: inline;"><a href="{{pathFor 'job'}}">{{title}}</a></h2>
                                </label>
                                <p>
                                    {{#if company}}<i class="fa fa-building" aria-hidden="true"></i> {{company}}&nbsp;&nbsp;{{/if}}
                                    {{#if country}}<i class="fa fa-flag" aria-hidden="true"></i> {{country}}&nbsp;&nbsp;{{/if}}
                                    {{#if location}}<i class="fa fa-map-marker" aria-hidden="true"></i> {{location}}{{/if}}
                                </p>
                                {{!-- p3-fix-003 / p3-fix-007: poster name + age so admins
                                      can triage without opening every card. --}}
                                <p class="text-muted small admin-job-meta">
                                    {{#if userName}}<i class="fa fa-user" aria-hidden="true"></i> {{userName}}&nbsp;&nbsp;{{/if}}
                                    <i class="fa fa-clock-o" aria-hidden="true"></i>
                                    {{t 'admin.posted_ago' age=(ageLabel createdAt)}}
                                </p>
                            </div>
                            <div class="col-sm-4 text-right">
                                {{>jobLabels}}
                                {{#if isExpired}}
                                    <span class="label label-warning" title="Older than 90 days—reactivating won’t bring it back to public listings.">
                                        <i class="fa fa-hourglass-end" aria-hidden="true"></i> {{t 'jobs.label.expired'}}
                                    </span>
                                {{/if}}
                                {{!-- p3-fix-005: dropped the duplicate "Status: X" line here.
                                      The status appears in jobStatusToggle below alongside its
                                      controls, which is where admins actually need it. --}}
                            </div>
                        </div>
                        {{>jobStatusToggle}}
                    </div>
                </div>
            {{else}}
                <div class="panel panel-default">
                    <div class="panel-body">
                        {{t 'admin.no_jobs_in_view'}}
                    </div>
                </div>
            {{/each}}

            {{#if showLoadMore}}
                <div class="text-center" style="margin: 16px 0;">
                    <button type="button" class="btn btn-default load-more">{{t 'action.load_more'}}</button>
                </div>
            {{/if}}
        {{else}}
            {{>loading}}
        {{/if}}

        {{!-- B3.7: minimal Admins panel — list who currently holds the
              admin role and offer grant/revoke. --}}
        <hr>
        <div class="row">
            <div class="col-sm-12">
                <h3>{{t 'admin.admins.section'}}</h3>
                {{#if Template.subscriptionsReady}}
                    <table class="table table-condensed">
                        <thead>
                            <tr>
                                <th>{{t 'admin.admins.col.name'}}</th>
                                <th>{{t 'admin.admins.col.email'}}</th>
                                <th>{{t 'admin.admins.col.created'}}</th>
                                <th><span class="sr-only">{{t 'admin.reports.col.actions'}}</span></th>
                            </tr>
                        </thead>
                        <tbody>
                            {{#each admins}}
                                <tr>
                                    <td>{{adminName}}</td>
                                    <td>{{adminEmail}}</td>
                                    <td>{{formatDate createdAt}}</td>
                                    <td>
                                        {{#unless isSelf}}
                                            <button type="button" class="btn btn-xs btn-danger revoke-admin" data-user-id="{{_id}}">
                                                {{t 'admin.admins.revoke'}}
                                            </button>
                                        {{/unless}}
                                    </td>
                                </tr>
                            {{else}}
                                <tr><td colspan="4" class="text-muted">{{t 'admin.admins.none_other'}}</td></tr>
                            {{/each}}
                        </tbody>
                    </table>
                    <form class="form-inline grant-admin-form">
                        <div class="form-group">
                            <label class="sr-only" for="grant-admin-input">{{t 'admin.admins.grant'}}</label>
                            <input id="grant-admin-input" type="text" class="form-control" placeholder="{{t 'admin.admins.id_placeholder'}}" autocomplete="off">
                        </div>
                        <button type="submit" class="btn btn-default">{{t 'admin.admins.grant'}}</button>
                        <p class="help-block">{{t 'admin.admins.help'}}</p>
                    </form>
                {{else}}
                    {{>loading}}
                {{/if}}
            </div>
        </div>

        {{!-- A9.26 — community report queue. Shows pending reports with
             a link to the offending job and one-click resolve buttons.
             The job's actual status is changed via the existing
             status-change controls in the table above. --}}
        <div class="row">
            <div class="col-md-12">
                <h3>
                    {{t 'admin.reports.heading'}}
                    {{#if pendingReportCount}}
                        <span class="badge">{{pendingReportCount}}</span>
                    {{/if}}
                </h3>
                {{#if pendingReportCount}}
                    <table class="table table-striped" aria-label="{{t 'admin.reports.heading'}}">
                        <thead>
                            <tr>
                                <th>{{t 'admin.reports.col.when'}}</th>
                                <th>{{t 'admin.reports.col.job'}}</th>
                                <th>{{t 'admin.reports.col.reason'}}</th>
                                <th>{{t 'admin.reports.col.details'}}</th>
                                <th>{{t 'admin.reports.col.actions'}}</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{#each pendingReports}}
                                <tr>
                                    <td>{{formatDate createdAt}}</td>
                                    <td>
                                        {{#with reportJob}}
                                            <a href="{{pathFor 'job' _id=_id slug=(slug)}}">{{title}}</a>
                                        {{else}}
                                            <em>{{t 'admin.reports.job_missing'}}</em>
                                        {{/with}}
                                    </td>
                                    <td>{{reportReasonLabel}}</td>
                                    <td>{{#if details}}{{details}}{{else}}—{{/if}}</td>
                                    <td>
                                        <button type="button" class="btn btn-default btn-xs resolve-report"
                                            data-id="{{_id}}" data-resolution="dismissed">
                                            {{t 'admin.reports.action.dismiss'}}
                                        </button>
                                        <button type="button" class="btn btn-warning btn-xs resolve-report"
                                            data-id="{{_id}}" data-resolution="job_removed">
                                            {{t 'admin.reports.action.removed'}}
                                        </button>
                                        <button type="button" class="btn btn-default btn-xs resolve-report"
                                            data-id="{{_id}}" data-resolution="reviewed">
                                            {{t 'admin.reports.action.reviewed'}}
                                        </button>
                                    </td>
                                </tr>
                            {{/each}}
                        </tbody>
                    </table>
                {{else}}
                    <p class="text-muted">{{t 'admin.reports.empty'}}</p>
                {{/if}}
            </div>
        </div>
    {{else}}
        <div class="alert alert-warning">
            {{t 'admin.access_required'}}
        </div>
    {{/if}}
</template>
