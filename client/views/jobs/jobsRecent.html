<template name="jobsRecent">
    <section id="jobsRecent">
        {{!-- A9.36 — Featured strip is exactly one grid row (3 random
             samples from the featuredJobs publication). It sits above
             the recent feed so the home page leads with paid listings
             without overwhelming the rest of the board. --}}
        {{#if hasFeatured}}
            <div class="featured-strip">
                <div class="featured-strip-heading">
                    <span class="featured-strip-badge">
                        <i class="fa fa-star" aria-hidden="true"></i>
                        {{t 'jobs.featured_strip_label'}}
                    </span>
                    <span class="featured-strip-subtitle">{{t 'jobs.featured_strip_subtitle'}}</span>
                </div>
                <div class="job-grid featured-strip-grid">
                    {{#each featuredJobs}}
                        {{>jobSmall}}
                    {{/each}}
                </div>
            </div>
        {{/if}}

        {{!-- A9.35 — same tile-grid layout as /jobs so the home recent
             feed reads as a board, not a vertical stack of rows. --}}
        {{#if hasRecent}}
            <div class="job-grid">
                {{#each jobs}}
                    {{>jobSmall}}
                {{/each}}
            </div>
        {{else}}
            {{#unless hasFeatured}}
                <p class="text-muted" style="padding: 16px 0; font-size:14px;">
                    <i class="fa fa-clock-o" aria-hidden="true"></i>
                    {{t 'jobs.none_found_empty'}}
                </p>
            {{/unless}}
        {{/if}}
    </section>
</template>
