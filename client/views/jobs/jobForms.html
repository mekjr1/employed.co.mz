<template name="jobNew">
    <div class="row">
        <div class="col-sm-10 col-sm-offset-1">
                <h4 class="text-center">Post roles for candidates in Mexico or Mozambique.</h4>
                <br>
                <p>Jobs are free to post.

                Your job post will remain on this site for 90 days.  After 90 days the post will no longer appear to visitors.

                You can feature your job post on the home page for 30 days after creating your post.</p>
                <br>
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h4>Create Your Job Post</h4>
                </div>
                <div class="panel-body">
                    {{#autoForm id="jobNew" collection="Jobs" type="normal" }}
                        {{>jobFields}}

                        <!-- reCAPTCHA v3 Badge Notice -->
                        <div class="form-group">
                            <small class="text-muted">
                                This site is protected by reCAPTCHA and the Google
                                <a href="https://policies.google.com/privacy" target="_blank">Privacy Policy</a> and
                                <a href="https://policies.google.com/terms" target="_blank">Terms of Service</a> apply.
                            </small>
                        </div>

                        <div>
                            <button type="submit" class="btn btn-primary" id="submitJobBtn"><i class="fa fa-chevron-right"></i> Continue to preview your post</button>
                        </div>
                    {{/autoForm}}
                </div>
            </div>
        </div>
    </div>
</template>
<template name="jobEdit">
    <div class="row">
        <div class="col-sm-10 col-sm-offset-1">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h4>Edit Job Post</h4>
                </div>
                <div class="panel-body">
                    {{!-- {{#if $eq job.status 'pending'}} --}}
                        {{#autoForm id="jobEdit" collection="Jobs" doc=job type="update" }}
                            {{>jobFields}}
                            <div>
                                <button type="submit" class="btn btn-primary"><i class="fa fa-floppy-o"></i> Update</button>
                                <button id="cancel" class="btn btn-default"> Cancel</button>
                            </div>
                        {{/autoForm}}
                    {{!-- {{else}}
                        <div class="alert alert-info">
                            <i class="fa fa-exclamation-triangle fa-2x pull-left"></i> Only pending jobs can be edited.
                            <br>
                            <a href="{{pathFor 'job' _id=job._id}}">Back to post</a>
                        </div>
                    {{/if}} --}}
                </div>
            </div>
        </div>
    </div>
</template>
<template name="jobFields">
    {{> afQuickField name='title' placeholder="Title displayed for your listing"}}
    {{> afQuickField name="jobtype" firstOption="(Select a Job Type)" options="allowed"}}
    {{> afQuickField name='company' placeholder="Name of the hiring company"}}
    {{> afQuickField name="country" firstOption="(Select a Country)" options="allowed"}}
    {{> afQuickField name='location' placeholder="City or region, for example Mexico City, Guadalajara, Maputo, or Beira"}}
    {{> afQuickField name='remote'}}
    {{> afQuickField name='description' rows=8 placeholder="Tell candidates about the role, requirements, salary range, work arrangement, and hiring process."}}
    {{> afQuickField name='url' placeholder="External URL of job posting"}}
    {{> afQuickField name='contact' placeholder="Email, phone, or hiring contact to display on the listing"}}
</template>
