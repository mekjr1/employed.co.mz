<!-- A10.0 — multi-provider featured checkout modal.
     Opened from #buy-featured. Reactively renders provider buttons
     fetched from `payment.providersForMarket`. For Stripe, the button
     triggers featuredJob.initiate and follows the returned redirect URL.
     For M-Pesa / e-Mola the modal reveals an MSISDN input, calls
     initiate with the entered number, then polls payment.status every
     3 seconds until a terminal state. -->

<template name="featuredCheckoutModal">
    <div class="modal fade brand-modal featured-checkout-modal"
         tabindex="-1" role="dialog"
         data-dialog-id="{{dialogId}}"
         aria-labelledby="{{dialogId}}-title">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{t 'modal.cancel'}}"></button>
                    <h4 class="modal-title" id="{{dialogId}}-title">
                        {{t 'job.featured.title'}}
                    </h4>
                </div>
                <div class="modal-body">
                    <p class="featured-checkout-price">
                        {{t 'job.featured.buy_cta' price=priceLabel}}
                    </p>

                    {{#if $eq stage "pick"}}
                        <p class="featured-checkout-hint">{{t 'checkout.pick_provider'}}</p>
                        <div class="featured-checkout-providers">
                            {{#each providers}}
                                <button type="button"
                                        class="btn w-100 featured-checkout-provider-btn provider-{{key}}"
                                        data-provider="{{key}}">
                                    <span class="featured-checkout-provider-name">{{providerLabel key name}}</span>
                                    {{#if simulator}}
                                        <span class="badge bg-warning text-dark featured-checkout-sim-tag">{{t 'checkout.simulator_tag'}}</span>
                                    {{/if}}
                                </button>
                            {{/each}}
                            {{#unless providers}}
                                <p class="text-muted">{{t 'checkout.no_providers'}}</p>
                            {{/unless}}
                        </div>
                    {{/if}}

                    {{#if $eq stage "msisdn"}}
                        <p class="featured-checkout-hint">
                            {{t (concat 'checkout.msisdn.hint.' selectedProvider)}}
                        </p>
                        <form class="featured-checkout-msisdn-form" novalidate>
                            <div class="form-group">
                                <label for="featured-msisdn-input">{{t 'checkout.msisdn.label'}}</label>
                                <input type="tel"
                                       id="featured-msisdn-input"
                                       class="form-control form-control-lg featured-checkout-msisdn-input"
                                       inputmode="numeric"
                                       autocomplete="tel-national"
                                       placeholder="{{t (concat 'checkout.msisdn.placeholder.' selectedProvider)}}"
                                       maxlength="13"
                                       value="{{msisdnValue}}" />
                                {{#if msisdnError}}
                                    <p class="form-text text-danger">{{msisdnError}}</p>
                                {{/if}}
                            </div>
                            <div class="featured-checkout-msisdn-actions">
                                <button type="button"
                                        class="btn btn-secondary featured-checkout-back-btn"
                                        data-action="back">
                                    {{t 'action.back'}}
                                </button>
                                <button type="submit"
                                        class="btn btn-primary featured-checkout-submit-btn"
                                        disabled="{{busyDisabled}}">
                                    {{#if busy}}
                                        <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
                                    {{/if}}
                                    {{t 'checkout.send_prompt'}}
                                </button>
                            </div>
                        </form>
                    {{/if}}

                    {{#if $eq stage "awaiting"}}
                        <div class="featured-checkout-awaiting">
                            <div class="featured-checkout-spinner" aria-hidden="true">
                                <i class="fa fa-mobile fa-3x"></i>
                            </div>
                            <p class="featured-checkout-status-title">
                                {{t (concat 'checkout.awaiting.title.' selectedProvider)}}
                            </p>
                            <p class="featured-checkout-status-detail text-muted">
                                {{t 'checkout.awaiting.detail'}}
                            </p>
                            <button type="button"
                                    class="btn btn-link featured-checkout-cancel-btn"
                                    data-action="cancel">
                                {{t 'checkout.cancel_attempt'}}
                            </button>
                        </div>
                    {{/if}}

                    {{#if $eq stage "redirecting"}}
                        <div class="featured-checkout-awaiting">
                            <div class="featured-checkout-spinner" aria-hidden="true">
                                <i class="fa fa-spinner fa-spin fa-3x"></i>
                            </div>
                            <p class="featured-checkout-status-title">
                                {{t 'checkout.redirecting'}}
                            </p>
                        </div>
                    {{/if}}

                    {{#if $eq stage "success"}}
                        <div class="featured-checkout-result featured-checkout-success">
                            <div aria-hidden="true">
                                <i class="fa fa-check-circle fa-3x text-success"></i>
                            </div>
                            <h4>{{t 'checkout.success.title'}}</h4>
                            <p>{{t 'checkout.success.detail'}}</p>
                        </div>
                    {{/if}}

                    {{#if $eq stage "failure"}}
                        <div class="featured-checkout-result featured-checkout-failure">
                            <div aria-hidden="true">
                                <i class="fa fa-times-circle fa-3x text-danger"></i>
                            </div>
                            <h4>{{t 'checkout.failure.title'}}</h4>
                            <p>{{t (concat 'checkout.failure.reason.' failureReason)}}</p>
                            <button type="button"
                                    class="btn btn-secondary featured-checkout-retry-btn"
                                    data-action="retry">
                                {{t 'checkout.try_again'}}
                            </button>
                        </div>
                    {{/if}}
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        {{t 'modal.close'}}
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>
