<template name="job">

    {{!-- ═══════════════════════════════════════════════════════════
         ADMIN CONTEXT BAR
         Only visible to admins. Sits above everything else as a
         clearly-labelled moderation tool — not mixed into the
         public job view.
    ═══════════════════════════════════════════════════════════ --}}
    {{#if isInRole 'admin'}}
        <div class="context-bar context-bar--admin">
            <div class="context-bar__header">
                <span class="context-bar__label">
                    <i class="fa fa-shield" aria-hidden="true"></i>
                    {{t 'admin.title'}}
                </span>
                <div class="context-bar__actions">
                    <a href="{{pathFor 'jobEdit'}}" class="btn btn-default btn-xs">
                        <i class="fa fa-pencil" aria-hidden="true"></i> {{t 'action.edit'}}
                    </a>
                    <button type="button" class="btn btn-link btn-xs context-bar__toggle" aria-expanded="false">
                        <i class="fa fa-chevron-down" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
            <div class="context-bar__body">
                {{>jobStatusToggle}}
                {{>jobStatusHistory}}
                <div class="context-bar__tweet">
                    <span class="context-bar__tweet-label">
                        <i class="fa fa-twitter" aria-hidden="true"></i> {{t 'admin.suggested_tweet'}}
                    </span>
                    <span class="context-bar__tweet-text">
                        {{title}} —
                        {{#if remote}}#Remote {{jobtype}}{{else}}{{jobtype}} in {{location}}{{/if}}
                        {{urlFor 'job'}} #EmployedJobs {{activeMarket.suggestedTag}}
                    </span>
                </div>
            </div>
        </div>
    {{/if}}

    {{!-- ═══════════════════════════════════════════════════════════
         OWNER CONTEXT BAR
         Only visible to the job poster (and not shown to admins
         who happen to own the job — they use the admin bar above).
         Compact strip: monetization first, then manage actions.
    ═══════════════════════════════════════════════════════════ --}}
    {{#unless isInRole 'admin'}}
        {{#if $eq userId $.Meteor.userId}}
            <div class="context-bar context-bar--owner">
                <div class="context-bar__header">
                    <span class="context-bar__label">
                        <i class="fa fa-briefcase" aria-hidden="true"></i>
                        {{t 'job.owner.your_listing'}}
                        <span class="status-badge status-{{status}}">{{statusLabel status}}</span>
                    </span>
                    <div class="context-bar__actions">
                        {{#if featuredAllowed}}
                            {{#unless featured}}
                                <a id="buy-featured" class="btn btn-warning btn-sm owner-featured-btn" role="button" href="#">
                                    <i class="fa fa-star" aria-hidden="true"></i>
                                    {{t 'job.featured.buy_cta' price=featuredJobPriceLabel}}
                                </a>
                            {{/unless}}
                        {{/if}}
                        <a href="{{pathFor 'jobEdit'}}" class="btn btn-default btn-sm">
                            <i class="fa fa-pencil" aria-hidden="true"></i> {{t 'action.edit'}}
                        </a>
                        {{#if $eq status "active"}}
                            <a id="job-deactivate" class="btn btn-danger btn-sm" role="button">
                                <i class="fa fa-times" aria-hidden="true"></i> {{t 'job.deactivate'}}
                            </a>
                        {{/if}}
                    </div>
                </div>
            </div>
        {{/if}}
    {{/unless}}

    {{!-- ═══════════════════════════════════════════════════════════
         STATUS ALERTS
         Shown to everyone when the job is not in a normal active
         state. Expired alert only shown to the owner.
    ═══════════════════════════════════════════════════════════ --}}
    {{>jobExpiredAlert}}
    {{>jobStatusAlert}}

    {{!-- ═══════════════════════════════════════════════════════════
         JOB HEADER BAND
         Public-facing identity: avatar, title, company, location,
         type. No action buttons here — those live in the sidebar.
    ═══════════════════════════════════════════════════════════ --}}
    <div class="job-detail-header">
        <div class="job-detail-avatar" aria-hidden="true">{{companyInitial}}</div>
        <h1 class="job-detail-title">{{title}}</h1>
        <div class="job-detail-meta">
            {{#if company}}
                <span><i class="fa fa-building" aria-hidden="true"></i> {{company}}</span>
            {{/if}}
            {{#if location}}
                <span><i class="fa fa-map-marker" aria-hidden="true"></i> {{location}}</span>
            {{/if}}
            <span><i class="fa fa-clock-o" aria-hidden="true"></i> {{jobtype}}</span>
            {{#if remote}}
                <span class="label label-success" style="vertical-align:middle;">
                    <i class="fa fa-globe" aria-hidden="true"></i> {{t 'jobs.label.remote'}}
                </span>
            {{/if}}
            {{#if featured}}
                <span class="brand-pill brand-pill-featured" style="vertical-align:middle;" title="{{t 'jobs.label.featured'}}">
                    <svg class="brand-pill-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><circle cx="50" cy="50" r="46" fill="currentColor"/><path d="M50 22 L57 42 L78 42 L61 54 L67 74 L50 62 L33 74 L39 54 L22 42 L43 42 Z" fill="#F59E0B"/></svg>
                    {{t 'jobs.label.featured'}}
                </span>
            {{/if}}
        </div>
    </div>

    {{!-- ═══════════════════════════════════════════════════════════
         TWO-COLUMN BODY
         col-8: job description (the content)
         col-4: sidebar (actions + metadata)
         Sidebar is intentionally on the RIGHT — it's secondary
         information that supports the description, not competes.
    ═══════════════════════════════════════════════════════════ --}}
    <div class="job-detail-body">
        <div class="row">

            {{!-- LEFT: Description --}}
            <div class="col-sm-8">
                <div class="job-detail-description">
                    {{#if htmlDescription}}
                        {{{htmlDescription}}}
                    {{else}}
                        <p class="text-muted">{{t 'job.no_description'}}</p>
                    {{/if}}
                </div>
            </div>

            {{!-- RIGHT: Sidebar --}}
            <div class="col-sm-4 job-detail-sidebar">

                {{!-- 1. Apply / Contact — primary action, top of sidebar --}}
                {{#unless isInRole 'admin'}}
                    {{#unless $eq userId $.Meteor.userId}}
                        {{#if contact}}
                            <div class="job-sidebar-card">
                                <h4>{{t 'job.sidebar.how_to_apply'}}</h4>
                                <a href="mailto:{{contact}}" class="btn btn-primary sidebar-apply-btn">
                                    <i class="fa fa-envelope" aria-hidden="true"></i>
                                    {{t 'job.apply_contact'}}
                                </a>
                                {{#if applyWhatsApp}}
                                    <a href="{{whatsappApplyUrl}}" target="_blank" rel="noopener noreferrer" class="btn btn-success sidebar-apply-whatsapp-btn" style="margin-top:8px; width:100%;">
                                        <i class="fa fa-whatsapp" aria-hidden="true"></i>
                                        {{t 'job.apply_whatsapp'}}
                                    </a>
                                {{/if}}
                                <div class="sidebar-row" style="margin-top:10px;">
                                    <i class="fa fa-envelope-o" aria-hidden="true"></i>
                                    <span style="word-break:break-all; font-size:13px;">{{contact}}</span>
                                </div>
                                {{#if url}}
                                    <div class="sidebar-row">
                                        <i class="fa fa-external-link" aria-hidden="true"></i>
                                        <a href="{{url}}" target="_blank" rel="noopener noreferrer" style="font-size:13px; word-break:break-all;">
                                            {{cutString url 40}}
                                        </a>
                                    </div>
                                {{/if}}
                            </div>
                        {{/if}}
                    {{/unless}}
                {{/unless}}

                {{!-- 2. Job details — metadata card --}}
                <div class="job-sidebar-card">
                    <h4>{{t 'job.sidebar.details'}}</h4>
                    {{#if jobtype}}
                        <div class="sidebar-row">
                            <i class="fa fa-clock-o" aria-hidden="true"></i>
                            <span>{{jobtype}}</span>
                        </div>
                    {{/if}}
                    {{#if location}}
                        <div class="sidebar-row">
                            <i class="fa fa-map-marker" aria-hidden="true"></i>
                            <span>{{location}}</span>
                        </div>
                    {{/if}}
                    {{#if country}}
                        <div class="sidebar-row">
                            <i class="fa fa-flag" aria-hidden="true"></i>
                            <span>{{country}}</span>
                        </div>
                    {{/if}}
                    <div class="sidebar-row">
                        <i class="fa fa-calendar" aria-hidden="true"></i>
                        <span>{{t 'jobs.posted_on' date=(formatDate (publicPostedDate))}}</span>
                    </div>
                    {{#if featured}}
                        <div class="sidebar-row">
                            <svg class="sidebar-brand-icon" viewBox="0 0 100 100" aria-hidden="true" focusable="false"><circle cx="50" cy="50" r="46" fill="#4F46E5"/><path d="M50 22 L57 42 L78 42 L61 54 L67 74 L50 62 L33 74 L39 54 L22 42 L43 42 Z" fill="#F59E0B"/></svg>
                            <span>{{t 'jobs.featured_until' date=(formatDate featuredThrough)}}</span>
                        </div>
                    {{/if}}
                </div>

                {{!-- 3. Report — only for non-owners, non-admins --}}
                {{#unless isInRole 'admin'}}
                    {{#unless $eq userId $.Meteor.userId}}
                        <div class="job-sidebar-card">
                            <button type="button" id="job-report" class="btn sidebar-report-btn">
                                <i class="fa fa-flag" aria-hidden="true"></i>
                                {{t 'job.report'}}
                            </button>
                        </div>
                    {{/unless}}
                {{/unless}}

            </div>
            {{!-- end sidebar --}}

        </div>
    </div>

    {{!-- Mobile sticky apply bar — non-owners only --}}
    {{#unless isInRole 'admin'}}
        {{#unless $eq userId $.Meteor.userId}}
            {{#if contact}}
                <div class="mobile-apply-bar">
                    <a href="mailto:{{contact}}" class="btn btn-primary">
                        <i class="fa fa-envelope" aria-hidden="true"></i>
                        {{t 'job.apply_contact'}}
                    </a>
                    {{#if applyWhatsApp}}
                        <a href="{{whatsappApplyUrl}}" target="_blank" rel="noopener noreferrer" class="btn btn-success" style="margin-left:8px;">
                            <i class="fa fa-whatsapp" aria-hidden="true"></i>
                            {{t 'job.apply_whatsapp'}}
                        </a>
                    {{/if}}
                </div>
            {{/if}}
        {{/unless}}
    {{/unless}}

</template>
