<!--
	A9.2 — Privacy and Terms scaffolding. The substantive text lives in
	`both/lib/i18n.js` under the `legal.*` namespace so the same routes
	render in the visitor's chosen locale. If your jurisdiction requires
	more specific language, edit the i18n keys; do not duplicate the
	body markup per language.
-->
<template name="legalPrivacy">
	<div class="row">
		<div class="col-md-8 col-md-offset-2">
			<h1>{{t 'legal.privacy.title'}}</h1>
			<p class="lead">{{t 'legal.privacy.intro'}}</p>

			<h2>{{t 'legal.privacy.data_we_collect'}}</h2>
			<p>{{t 'legal.privacy.data_we_collect_body'}}</p>

			<h2>{{t 'legal.privacy.use'}}</h2>
			<p>{{t 'legal.privacy.use_body'}}</p>

			<h2>{{t 'legal.privacy.retention'}}</h2>
			<p>{{t 'legal.privacy.retention_body'}}</p>

			<h2>{{t 'legal.privacy.rights'}}</h2>
			<p>{{t 'legal.privacy.rights_body'}}</p>

			<h2>{{t 'legal.privacy.contact'}}</h2>
			<p>{{t 'legal.privacy.contact_body' email=contactEmail}}</p>

			<p><small class="text-muted">{{t 'legal.privacy.last_updated' date=lastUpdated}}</small></p>
		</div>
	</div>
</template>

<template name="legalTerms">
	<div class="row">
		<div class="col-md-8 col-md-offset-2">
			<h1>{{t 'legal.terms.title'}}</h1>
			<p class="lead">{{t 'legal.terms.intro'}}</p>

			<h2>{{t 'legal.terms.acceptable_use'}}</h2>
			<p>{{t 'legal.terms.acceptable_use_body'}}</p>

			<h2>{{t 'legal.terms.payments'}}</h2>
			<p>{{t 'legal.terms.payments_body'}}</p>

			<h2>{{t 'legal.terms.liability'}}</h2>
			<p>{{t 'legal.terms.liability_body'}}</p>

			<h2>{{t 'legal.terms.changes'}}</h2>
			<p>{{t 'legal.terms.changes_body'}}</p>

			<p><small class="text-muted">{{t 'legal.privacy.last_updated' date=lastUpdated}}</small></p>
		</div>
	</div>
</template>
