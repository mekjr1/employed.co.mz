<template name="notFound">
	<div class="row">
		<div class="col-sm-8 col-sm-offset-2 text-center brand-404">
			<svg class="brand-404-illustration" viewBox="0 0 200 200" role="img" aria-hidden="true" focusable="false">
				{{!-- closed door --}}
				<rect x="30" y="180" width="140" height="6" rx="2" fill="#E5E7EB"/>
				<rect x="50" y="36" width="100" height="148" rx="6" fill="#4F46E5"/>
				<rect x="60" y="46" width="80" height="128" rx="4" fill="none" stroke="#FAFAF7" stroke-width="2" opacity="0.5"/>
				{{!-- 404 plate --}}
				<rect x="70" y="82" width="60" height="30" rx="4" fill="#FAFAF7"/>
				<text x="100" y="104" text-anchor="middle" font-family="Montserrat,Inter,sans-serif" font-weight="900" font-size="16" fill="#B45309" letter-spacing="1">404</text>
				{{!-- door handle --}}
				<circle cx="130" cy="130" r="4" fill="#F59E0B"/>
			</svg>
			<h3 class="brand-404-title">{{t 'notfound.title'}}</h3>
			<p class="brand-404-body">{{t 'notfound.body'}}</p>
			<p>
				<a class="btn btn-primary" href="{{pathFor 'jobs'}}">
					<i class="fa fa-arrow-left" aria-hidden="true"></i> {{t 'notfound.back'}}
				</a>
			</p>

			{{!-- A9.33 — Ads Phase 0 (mock). `empty-state` slot on 404.
			     See docs/ads-strategy.md. --}}
			{{> adSlot position="empty-state"}}
		</div>
	</div>
</template>
