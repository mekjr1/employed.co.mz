<template name="loading">
	<div class="row">
		<div class="col-sm-12 text-center brand-loading">
			<br>
			<br>
			<svg class="brand-loading-mark" viewBox="0 0 100 100" role="img" aria-label="Loading" focusable="false">
				<rect width="100" height="100" rx="22" fill="#4F46E5"/>
				<g fill="#FFFFFF">
					<rect x="22" y="22" width="10" height="56" rx="3"/>
					<rect x="22" y="22" width="52" height="10" rx="3"/>
					<rect x="22" y="45" width="36" height="10" rx="3"/>
					<rect x="22" y="68" width="48" height="10" rx="3"/>
				</g>
				<circle class="brand-loading-spark" cx="82" cy="27" r="6" fill="#F59E0B"/>
			</svg>
			<p class="brand-loading-label">{{t 'app.loading'}}</p>
		</div>
	</div>
</template>
