services:
  mongo:
    image: mongo:5
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8026:8025"
      - "1026:1025"

volumes:
  mongo-data:
