<!--
  Business card — 85mm × 55mm at 300dpi = 1004 × 650 px (rounded). Side by side: front (left), back (right).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2050 650" role="img" aria-labelledby="bcardTitle">
  <title id="bcardTitle">Employed business card</title>

  <!-- ====================== FRONT (left) ====================== -->
  <g>
    <rect x="0" y="0" width="1004" height="650" fill="#FAFAF7" stroke="#E5E7EB" stroke-width="1"/>
    <!-- Mark top-left -->
    <g transform="translate(80 80)">
      <rect width="100" height="100" rx="22" fill="#4F46E5"/>
      <g fill="#FFFFFF">
        <rect x="22" y="22" width="10" height="56" rx="3"/>
        <rect x="22" y="22" width="52" height="10" rx="3"/>
        <rect x="22" y="45" width="36" height="10" rx="3"/>
        <rect x="22" y="68" width="48" height="10" rx="3"/>
      </g>
      <circle cx="82" cy="27" r="6" fill="#F59E0B"/>
    </g>
    <!-- Name -->
    <text x="80" y="380" font-family="Montserrat, sans-serif" font-weight="800" font-size="44" fill="#111827" letter-spacing="-1">Abdul G. M. Meque</text>
    <text x="80" y="420" font-family="Inter, sans-serif" font-weight="500" font-size="22" fill="#6B7280">Founder · Employed</text>
    <!-- Divider -->
    <line x1="80" y1="460" x2="180" y2="460" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <!-- Contact -->
    <text x="80" y="510" font-family="Inter, sans-serif" font-weight="600" font-size="20" fill="#374151">abdul@employed.co.mz</text>
    <text x="80" y="538" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="#6B7280">+258 84 000 0000</text>
    <text x="80" y="566" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="#6B7280">employed.co.mz</text>
  </g>

  <!-- 22mm gutter -->
  <rect x="1004" y="0" width="42" height="650" fill="#FFFFFF"/>

  <!-- ====================== BACK (right) ====================== -->
  <g transform="translate(1046 0)">
    <rect width="1004" height="650" fill="#27272B"/>
    <!-- Dot grid -->
    <g fill="#4F46E5" opacity="0.18">
      <circle cx="60" cy="60" r="3"/><circle cx="120" cy="60" r="3"/>
      <circle cx="60" cy="120" r="3"/>
    </g>
    <!-- Wordmark centered -->
    <text x="502" y="320" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="900" font-size="124" fill="#FAFAF7" letter-spacing="-4">Employ<tspan fill="#F59E0B">ed</tspan></text>
    <text x="502" y="368" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="22" fill="#9CA3AF" letter-spacing="2">L O C A L · J O B S</text>
    <line x1="462" y1="400" x2="542" y2="400" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
