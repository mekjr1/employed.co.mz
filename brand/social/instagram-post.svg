<!-- 1080×1080 — Instagram square post template. Drop new copy into the white card area. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="igPostTitle">
  <title id="igPostTitle">Employed — Instagram post</title>
  <rect width="1080" height="1080" fill="#27272B"/>
  <!-- Dot grid -->
  <g fill="#4F46E5" opacity="0.16">
    <circle cx="80" cy="80" r="4"/><circle cx="180" cy="80" r="4"/><circle cx="280" cy="80" r="4"/>
    <circle cx="80" cy="180" r="4"/><circle cx="180" cy="180" r="4"/>
    <circle cx="80" cy="280" r="4"/>
    <circle cx="1000" cy="800" r="4"/><circle cx="900" cy="800" r="4"/><circle cx="800" cy="800" r="4"/>
    <circle cx="1000" cy="900" r="4"/><circle cx="900" cy="900" r="4"/>
    <circle cx="1000" cy="1000" r="4"/>
  </g>
  <!-- White card -->
  <rect x="90" y="220" width="900" height="640" rx="32" fill="#FAFAF7"/>
  <!-- Mark inside card top-left -->
  <g transform="translate(150 290)">
    <rect width="120" height="120" rx="26" fill="#4F46E5"/>
    <g fill="#FFFFFF">
      <rect x="26" y="26" width="12" height="68" rx="3"/>
      <rect x="26" y="26" width="62" height="12" rx="3"/>
      <rect x="26" y="54" width="44" height="12" rx="3"/>
      <rect x="26" y="82" width="58" height="12" rx="3"/>
    </g>
    <circle cx="98" cy="32" r="7" fill="#F59E0B"/>
  </g>
  <!-- Headline placeholder -->
  <text x="150" y="540" font-family="Montserrat, sans-serif" font-weight="900" font-size="72" fill="#111827" letter-spacing="-2">Headline here.</text>
  <text x="150" y="610" font-family="Montserrat, sans-serif" font-weight="900" font-size="72" fill="#111827" letter-spacing="-2">Two lines max.</text>
  <text x="150" y="690" font-family="Inter, sans-serif" font-weight="500" font-size="28" fill="#6B7280">Replace this body line with the actual post copy.</text>
  <text x="150" y="724" font-family="Inter, sans-serif" font-weight="500" font-size="28" fill="#6B7280">Two short sentences are plenty.</text>
  <!-- Amber accent + handle -->
  <line x1="150" y1="780" x2="220" y2="780" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  <text x="150" y="824" font-family="Inter, sans-serif" font-weight="700" font-size="24" fill="#4F46E5">@employed.co.mz</text>
</svg>
