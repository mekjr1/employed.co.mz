<!--
  Drop-in HTML email signature. Paste the contents of the <table> below
  into Gmail / Outlook signature settings. Edit name + role + phone only.
  All styles are inline because Gmail strips <style> blocks.
-->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Employed email signature</title></head>
<body style="margin:0;padding:24px;background:#F9FAFB;font-family:Inter,system-ui,sans-serif;">

  <!-- ====== COPY EVERYTHING INSIDE THIS TABLE ====== -->
  <table cellpadding="0" cellspacing="0" border="0" style="font-family:Inter,Arial,sans-serif;color:#374151;line-height:1.4;">
    <tr>
      <!-- Logo -->
      <td style="vertical-align:top;padding-right:18px;border-right:2px solid #4F46E5;">
        <img src="https://employed.co.mz/images/icon-192x192.png" width="56" height="56" alt="Employed" style="display:block;border-radius:12px;">
      </td>
      <!-- Details -->
      <td style="vertical-align:top;padding-left:18px;">
        <div style="font-family:Montserrat,Arial,sans-serif;font-weight:800;font-size:18px;color:#111827;letter-spacing:-0.3px;">
          Your Name
        </div>
        <div style="font-size:13px;color:#6B7280;margin-top:2px;">
          Your Role <span style="color:#F59E0B;">·</span> Employed
        </div>
        <div style="font-size:13px;color:#374151;margin-top:10px;">
          <a href="mailto:you@employed.co.mz" style="color:#4F46E5;text-decoration:none;">you@employed.co.mz</a>
          &nbsp;·&nbsp;
          +258 84 000 0000
        </div>
        <div style="font-size:12px;color:#6B7280;margin-top:6px;">
          <a href="https://employed.co.mz" style="color:#6B7280;text-decoration:none;">employed.co.mz</a>
          &nbsp;·&nbsp;
          <a href="https://employed.com.mx" style="color:#6B7280;text-decoration:none;">employed.com.mx</a>
        </div>
      </td>
    </tr>
  </table>
  <!-- ====== END COPY ====== -->

</body>
</html>
