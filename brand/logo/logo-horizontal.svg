<!--
  Horizontal lockup: square mark + wordmark, baseline-aligned.
  Optical height of the mark and the "Employ" stroke match.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" role="img" aria-labelledby="employedHTitle">
  <title id="employedHTitle">Employed</title>
  <!-- Mark -->
  <g transform="translate(0 0)">
    <rect width="100" height="100" rx="22" fill="#4F46E5"/>
    <g fill="#FFFFFF">
      <rect x="22" y="22" width="10" height="56" rx="3"/>
      <rect x="22" y="22" width="52" height="10" rx="3"/>
      <rect x="22" y="45" width="36" height="10" rx="3"/>
      <rect x="22" y="68" width="48" height="10" rx="3"/>
    </g>
    <circle cx="82" cy="27" r="6" fill="#F59E0B"/>
  </g>
  <!-- Wordmark -->
  <text x="124" y="68" font-family="Montserrat, 'Trebuchet MS', sans-serif" font-weight="900" font-size="56" fill="#111827" letter-spacing="-1.5">Employ<tspan fill="#F59E0B">ed</tspan></text>
</svg>
