upstream employed_frontend {
    server frontend:3000;
}

upstream employed_backend {
    server backend:8000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name mz.employed.co.mz mx.employed.co.mz;

    # SSL termination placeholder:
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/employed/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/employed/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;

    location /_next/static/ {
        proxy_pass http://employed_frontend;
        proxy_cache_bypass $http_upgrade;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:css|js|mjs|ico|gif|jpe?g|png|svg|webp|woff2?)$ {
        proxy_pass http://employed_frontend;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /api/ {
        proxy_pass http://employed_backend;
        proxy_set_header Connection $connection_upgrade;
    }

    location = /_stripe/webhook {
        proxy_pass http://employed_backend;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location = /_mpesa/callback {
        proxy_pass http://employed_backend;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location = /_emola/callback {
        proxy_pass http://employed_backend;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://employed_frontend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }
}
