services:
  postgres:
    ports:
      - "3302:5432"

  redis:
    ports:
      - "3303:6379"

  migrate:
    volumes:
      - ../backend:/app

  backend:
    volumes:
      - ../backend:/app
      - ./scripts/wait-for-it.sh:/wait-for-it.sh:ro
    command: ["sh", "-c", "sh /wait-for-it.sh postgres:5432 -- sh /wait-for-it.sh redis:6379 -- uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  worker:
    volumes:
      - ../backend:/app
      - ./scripts/wait-for-it.sh:/wait-for-it.sh:ro
    command: ["sh", "-c", "sh /wait-for-it.sh postgres:5432 -- sh /wait-for-it.sh redis:6379 -- arq app.workers.config.WorkerSettings"]

  frontend:
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3301}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}

volumes:
  frontend_node_modules:
  frontend_next:
